name: Listkomat
options:
  bundleIdPrefix: cz.flipcom
  deploymentTarget:
    iOS: "16.2"
  developmentLanguage: cs
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"            # language mode; bump to 6.0 once it builds clean
    DEVELOPMENT_TEAM: ""           # set after Apple Developer enrollment
    CODE_SIGN_STYLE: Automatic

targets:
  Listkomat:
    type: application
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - Listkomat
      - Shared
    dependencies:
      - target: ListkomatWidgets
    info:
      path: Listkomat/Info.plist
      properties:
        CFBundleDisplayName: Lístkomat
        NSLocationWhenInUseUsageDescription: "Podle polohy vám appka rovnou nabídne lístky pro nejbližší město. Bez polohy si město vyberete ručně."
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - AlteHaasGroteskRegular.ttf
          - AlteHaasGroteskBold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomat
        TARGETED_DEVICE_FAMILY: "1"

  ListkomatWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - ListkomatWidgets
      - Shared
    info:
      path: ListkomatWidgets/Info.plist
      properties:
        CFBundleDisplayName: Lístkomat
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomat.widgets

  ListkomatTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - ListkomatTests
    dependencies:
      - target: Listkomat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomatTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Listkomat:
    build:
      targets:
        Listkomat: all
    test:
      targets:
        - ListkomatTests
