name: Listkomat
options:
  bundleIdPrefix: cz.flipcom
  deploymentTarget:
    iOS: "16.2"
  developmentLanguage: cs
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "2.0.1"
    CURRENT_PROJECT_VERSION: "8"
    SWIFT_VERSION: "5.0"            # language mode; bump to 6.0 once it builds clean
    DEVELOPMENT_TEAM: "35AS7FL468" # Jiri Zajic team (paid program)
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES   # Xcode "recommended setting" (no run-script phases anyway)

targets:
  Listkomat:
    type: application
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - Listkomat
      - Shared
    dependencies:
      - target: ListkomatWidgets
    info:
      path: Listkomat/Info.plist
      properties:
        CFBundleDisplayName: Lístkomat
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSLocationWhenInUseUsageDescription: "Podle polohy vám appka rovnou nabídne lístky pro nejbližší město. Bez polohy si město vyberete ručně."
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - AlteHaasGroteskRegular.ttf
          - AlteHaasGroteskBold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomatapp
        TARGETED_DEVICE_FAMILY: "1"

  ListkomatWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - ListkomatWidgets
      - Shared
    info:
      path: ListkomatWidgets/Info.plist
      properties:
        CFBundleDisplayName: Lístkomat
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomatapp.widgets

  ListkomatTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - ListkomatTests
    dependencies:
      - target: Listkomat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.flipcom.listkomatappTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Listkomat:
    build:
      targets:
        Listkomat: all
    test:
      targets:
        - ListkomatTests
